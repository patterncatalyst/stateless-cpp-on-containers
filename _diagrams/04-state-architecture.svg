<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" font-family="Helvetica, Arial, sans-serif">
<rect width="100%" height="100%" fill="#ffffff"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/></marker></defs>
<text x="480" y="32" font-size="22" font-weight="600" text-anchor="middle" fill="#1e1e1e">04 — State Architecture: Three Columns</text>
<rect x="30" y="80" width="290" height="430" rx="8" ry="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="175.0" y="108" font-size="15" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#2563eb">PROCESS-SCOPED</text>
<text x="175.0" y="132" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#1e1e1e">lives for the process; rebuildable from config</text>
<rect x="50" y="160" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="175.0" y="176.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">TracerProvider</text>
<rect x="50" y="200" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="175.0" y="216.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">gRPC Channel cache</text>
<rect x="50" y="240" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="175.0" y="256.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Redis / PG pool</text>
<rect x="50" y="280" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="175.0" y="296.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Prepared statements</text>
<rect x="50" y="320" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="175.0" y="336.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">In-process caches</text>
<rect x="50" y="360" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="175.0" y="376.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Parsed config</text>
<rect x="50" y="400" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="175.0" y="416.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Thread pools</text>
<rect x="50" y="440" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="175.0" y="456.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">PMR upstream</text>
<rect x="335" y="80" width="290" height="430" rx="8" ry="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
<text x="480.0" y="108" font-size="15" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#16a34a">REQUEST-SCOPED</text>
<text x="480.0" y="132" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#1e1e1e">lives for the handler; RAII</text>
<rect x="355" y="160" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="480.0" y="176.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">CallbackServerContext</text>
<rect x="355" y="200" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="480.0" y="216.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">ClientContext (outbound)</text>
<rect x="355" y="240" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="480.0" y="256.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Active span / OTel scope</text>
<rect x="355" y="280" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="480.0" y="296.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Checked-out connection</text>
<rect x="355" y="320" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="480.0" y="336.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">PMR monotonic arena</text>
<rect x="355" y="360" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="480.0" y="376.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Parsed req/resp</text>
<rect x="355" y="400" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="480.0" y="416.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Intermediate computations</text>
<rect x="640" y="80" width="290" height="430" rx="8" ry="8" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
<text x="785.0" y="108" font-size="15" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#ea580c">EXTERNAL</text>
<text x="785.0" y="132" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#1e1e1e">lives outside any process; authoritative</text>
<rect x="660" y="160" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="785.0" y="176.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Session / user state</text>
<rect x="660" y="200" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="785.0" y="216.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Counters &amp; rate-limit windows</text>
<rect x="660" y="240" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="785.0" y="256.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Durable workflow state</text>
<rect x="660" y="280" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="785.0" y="296.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Inter-service queue items</text>
<rect x="660" y="320" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="785.0" y="336.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Business data</text>
<rect x="660" y="360" width="250" height="32" rx="8" ry="8" fill="#ffffff" stroke="#1e1e1e" stroke-width="2"/><text x="785.0" y="376.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Audit logs</text>
<text x="480" y="530" font-size="12" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#1e1e1e">Anywhere a piece of state could go in two columns is a design smell. Pick one.</text>
</svg>