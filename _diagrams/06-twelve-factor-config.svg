<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920" height="560" font-family="Helvetica, Arial, sans-serif">
<rect width="100%" height="100%" fill="#ffffff"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/></marker></defs>
<text x="460" y="32" font-size="22" font-weight="600" text-anchor="middle" fill="#1e1e1e">06 — 12-Factor for C++: Where Config Lives</text>
<rect x="60" y="100" width="800" height="90" rx="8" ry="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
<text x="90" y="128" font-size="18" font-family="Helvetica, Arial, sans-serif" text-anchor="start" dominant-baseline="hanging" fill="#4f46e5">Compile-time</text>
<text x="90" y="154" font-size="13" font-family="Cascadia Code, Consolas, monospace" text-anchor="start" dominant-baseline="hanging" fill="#1e1e1e">if constexpr, templates, concepts</text>
<text x="90" y="176" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="start" dominant-baseline="hanging" fill="#1e1e1e">Doesn't vary across deploys at all</text>
<rect x="60" y="205" width="800" height="90" rx="8" ry="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
<text x="90" y="233" font-size="18" font-family="Helvetica, Arial, sans-serif" text-anchor="start" dominant-baseline="hanging" fill="#4f46e5">Link-time</text>
<text x="90" y="259" font-size="13" font-family="Cascadia Code, Consolas, monospace" text-anchor="start" dominant-baseline="hanging" fill="#1e1e1e">static linking, LTO, allocator choice</text>
<text x="90" y="281" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="start" dominant-baseline="hanging" fill="#1e1e1e">Baked at link, not parameterizable at run</text>
<rect x="60" y="310" width="800" height="90" rx="8" ry="8" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/>
<text x="90" y="338" font-size="18" font-family="Helvetica, Arial, sans-serif" text-anchor="start" dominant-baseline="hanging" fill="#ca8a04">Env-time (12-factor)</text>
<text x="90" y="364" font-size="13" font-family="Cascadia Code, Consolas, monospace" text-anchor="start" dominant-baseline="hanging" fill="#1e1e1e">std::getenv read once in main()</text>
<text x="90" y="386" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="start" dominant-baseline="hanging" fill="#1e1e1e">Deploy-varying config — THIS is what 12-factor means</text>
<rect x="60" y="415" width="800" height="90" rx="8" ry="8" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
<text x="90" y="443" font-size="18" font-family="Helvetica, Arial, sans-serif" text-anchor="start" dominant-baseline="hanging" fill="#be185d">Runtime-fetched</text>
<text x="90" y="469" font-size="13" font-family="Cascadia Code, Consolas, monospace" text-anchor="start" dominant-baseline="hanging" fill="#1e1e1e">control plane / config service / Consul</text>
<text x="90" y="491" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="start" dominant-baseline="hanging" fill="#1e1e1e">Changes mid-process; rare but real</text>
<line x1="40" y1="95" x2="40" y2="530" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
<text x="15" y="310" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#1e1e1e"><tspan x="15" dy="0">deploy-time</tspan><tspan x="15" dy="13">variation</tspan><tspan x="15" dy="13">(more →)</tspan></text>
</svg>