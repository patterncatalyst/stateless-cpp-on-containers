<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="Helvetica, Arial, sans-serif">
<rect width="100%" height="100%" fill="#ffffff"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1e1e1e"/></marker></defs>
<text x="450" y="32" font-size="22" font-weight="600" text-anchor="middle" fill="#1e1e1e">08 — Container Filesystem: Layers and Lifetimes</text>
<rect x="200" y="470" width="500" height="50" rx="8" ry="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="450.0" y="495.0" font-size="13" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Base layer (Fedora/Alpine)   (read-only)</text>
<rect x="200" y="415" width="500" height="50" rx="8" ry="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="450.0" y="440.0" font-size="13" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">System libraries   (read-only)</text>
<rect x="200" y="360" width="500" height="50" rx="8" ry="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="450.0" y="385.0" font-size="13" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Application binary + assets   (read-only)</text>
<rect x="200" y="305" width="500" height="50" rx="8" ry="8" fill="#fecaca" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 4"/><text x="450.0" y="330.0" font-size="13" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">Writable layer (overlayfs)  —  ephemeral</text>
<rect x="70" y="300" width="110" height="80" rx="8" ry="8" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/><text x="125.0" y="340.0" font-size="14" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e"><tspan x="125.0" dy="-8.0">tmpfs</tspan><tspan x="125.0" dy="16">/tmp</tspan></text>
<text x="125" y="395" font-size="10" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#1e1e1e"><tspan x="125" dy="0">RAM-backed,</tspan><tspan x="125" dy="12">recycled on restart</tspan></text>
<rect x="720" y="300" width="110" height="80" rx="8" ry="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="775.0" y="340.0" font-size="14" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e"><tspan x="775.0" dy="-8.0">Persistent</tspan><tspan x="775.0" dy="16">Volume</tspan></text>
<text x="775" y="395" font-size="10" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#1e1e1e"><tspan x="775" dy="0">Survives restart,</tspan><tspan x="775" dy="12">explicitly mounted</tspan></text>
<text x="450" y="100" font-size="13" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#dc2626">What dies on restart:  writable layer + tmpfs contents</text>
<text x="450" y="125" font-size="13" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#16a34a">What survives:  image layers, persistent volumes, external state</text>
<text x="450" y="165" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#1e1e1e">C++ traps  →  /var/log writes (use stdout), /var/crash dumps (use stderr),</text>
<text x="450" y="183" font-size="11" font-family="Helvetica, Arial, sans-serif" text-anchor="middle" dominant-baseline="hanging" fill="#1e1e1e">ML model caches (use volume), spdlog file sinks (use stdout sink)</text>
<rect x="280" y="220" width="340" height="40" rx="8" ry="8" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"/><text x="450.0" y="240.0" font-size="12" font-family="Cascadia Code, Consolas, monospace" text-anchor="middle" dominant-baseline="middle" fill="#1e1e1e">read_only: true makes accidental writes fail loudly</text>
</svg>